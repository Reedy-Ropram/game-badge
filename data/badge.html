<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Game Badge</title>
    <style>
        :root {
            --cover-x: 0px; --cover-y: 0px;
            --meta-x: 220px; --meta-y: 0px;
            --title-size: 28px; --text-size: 18px;
            --text-color: #ffffff; --bg-color: transparent;
            
            /* Toggles managed dynamically by the C++ plugin */
            --show-cover: block; --show-title: block;
            --show-platform: block; --show-dev: block;
            --show-pub: block; --show-region: block;
            --show-country: block; --show-custom: block;
        }
        
        html, body {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background: var(--bg-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .badge-container { position: relative; width: 100%; height: 100%; padding: 20px; }
        
        .cover-art {
            position: absolute; left: var(--cover-x); top: var(--cover-y);
            width: 180px; height: 240px; object-fit: cover;
            border-radius: 8px; box-shadow: 0 8px 16px rgba(0,0,0,0.5);
            display: var(--show-cover);
        }
        .metadata {
            position: absolute; left: var(--meta-x); top: var(--meta-y);
            color: var(--text-color); text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            font-size: var(--text-size); line-height: 1.4;
        }
        
        #game-title { display: var(--show-title); font-size: var(--title-size); font-weight: bold; margin-bottom: 8px; }
        #game-platform { display: var(--show-platform); margin-bottom: 4px; }
        #game-dev { display: var(--show-dev); margin-bottom: 4px; }
        #game-pub { display: var(--show-pub); margin-bottom: 4px; }
        #game-region { display: var(--show-region); margin-bottom: 4px; }
        #game-country { display: var(--show-country); margin-bottom: 4px; }
        
        #custom-text { 
            display: var(--show-custom); 
            margin-bottom: 12px; 
            color: #00ffcc; 
            font-weight: bold; 
            font-size: calc(var(--text-size) + 2px);
        }
    </style>
</head>
<body>
    <div class="badge-container">
        <img id="cover" class="cover-art" src="">
        <div id="meta" class="metadata">
            <div id="custom-text"></div>
            <div id="game-title"></div>
            <div id="game-platform"></div>
            <div id="game-dev"></div>
            <div id="game-pub"></div>
            <div id="game-region"></div>
            <div id="game-country"></div>
        </div>
    </div>

    <script>
        // Poll the local JSON file generated by the C++ plugin backend
        setInterval(async () => {
            try {
                const response = await fetch('game_data.json?t=' + new Date().getTime());
                const game = await response.json();

                if (game.cover_url) document.getElementById('cover').src = game.cover_url;
                document.getElementById('custom-text').innerText = game.custom_text || '';
                document.getElementById('game-title').innerText = game.title || '';
                document.getElementById('game-platform').innerText = game.platform ? `Platform: ${game.platform}` : '';
                document.getElementById('game-dev').innerText = game.developer ? `Developer: ${game.developer}` : '';
                document.getElementById('game-pub').innerText = game.publisher ? `Publisher: ${game.publisher}` : '';
                document.getElementById('game-region').innerText = game.region ? `Region: ${game.region}` : '';
                document.getElementById('game-country').innerText = game.country ? `Country: ${game.country}` : '';
            } catch (e) {
                // Silent catch during file writes
            }
        }, 1000);
    </script>
</body>
</html>
